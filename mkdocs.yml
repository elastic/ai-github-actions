site_name: AI GitHub Actions
repo_url: https://github.com/elastic/ai-github-actions
docs_dir: docs
site_dir: site
theme:
  name: material
extra_css:
  - assets/extra.css
hooks:
  - docs/hooks.py
nav:
  - Home: index.md
  - Workflows:
      - GitHub Agent Workflows:
          - Overview: workflows/gh-agent-workflows.md
          - Human-coordinated:
              - Docs PR Review: workflows/gh-agent-workflows/docs-pr-review.md
              - Duplicate Issue Detector: workflows/gh-agent-workflows/duplicate-issue-detector.md
              - Issue Triage: workflows/gh-agent-workflows/issue-triage.md
              - Issue Triage (with PR): workflows/gh-agent-workflows/issue-triage-pr.md
              - Mention in Issue: workflows/gh-agent-workflows/mention-in-issue.md
              - Mention in PR: workflows/gh-agent-workflows/mention-in-pr.md
              - PR CI Detective: workflows/gh-agent-workflows/pr-ci-detective.md
              - PR CI Fixer: workflows/gh-agent-workflows/pr-ci-fixer.md
              - PR Review: workflows/gh-agent-workflows/pr-review.md
              - Update PR Body: workflows/gh-agent-workflows/update-pr-body.md
          - Scheduled / Agent Factory:
              - Agent Efficiency: workflows/gh-agent-workflows/agent-efficiency.md
              - Agent Suggestions: workflows/gh-agent-workflows/agent-suggestions.md
              - Breaking Change Detect: workflows/gh-agent-workflows/breaking-change-detect.md
              - Bug Exterminator: workflows/gh-agent-workflows/bug-exterminator.md
              - Bug Hunter: workflows/gh-agent-workflows/bug-hunter.md
              - Code Simplifier: workflows/gh-agent-workflows/code-simplifier.md
              - Docs Drift: workflows/gh-agent-workflows/docs-drift.md
              - Docs Drift External: workflows/gh-agent-workflows/docs-drift-external.md
              - Docs New Contributor Review: workflows/gh-agent-workflows/docs-new-contributor-review.md
              - Docs New Contributor Review External: workflows/gh-agent-workflows/docs-new-contributor-review-external.md
              - Downstream Health: workflows/gh-agent-workflows/downstream-health.md
              - Flaky Test Triage: workflows/gh-agent-workflows/flaky-test-triage.md
              - Performance Profiler: workflows/gh-agent-workflows/performance-profiler.md
              - Project Summary: workflows/gh-agent-workflows/project-summary.md
              - Release Update Check: workflows/gh-agent-workflows/release-update.md
              - Semantic Function Clustering: workflows/gh-agent-workflows/semantic-function-clustering.md
              - Small Problem Fixer: workflows/gh-agent-workflows/small-problem-fixer.md
              - Stale Issues: workflows/gh-agent-workflows/stale-issues.md
              - Test Improvement: workflows/gh-agent-workflows/test-improvement.md
      - Claude Composite Actions: workflows/claude-workflows.md
  - Agent Context: agent-context.md
  - Developing: developing.md
  - Security: security.md
  - Release: release.md
markdown_extensions:
  - admonition
  - toc:
      permalink: true
