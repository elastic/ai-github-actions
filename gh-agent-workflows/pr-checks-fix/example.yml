name: PR Checks Fix
on:
  # Customize trigger events, filters, and schedules for your repo.
  workflow_run:
    # Update workflow names to match your CI workflows.
    workflows: ["CI", "Build", "Test"]
    types: [completed]

permissions:
  # Use least-privilege; add write scopes only when needed.
  actions: read
  contents: write
  discussions: write
  issues: write
  pull-requests: write

jobs:
  run:
    # Gate execution (for example, /ai commands or label filters).
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      toJSON(github.event.workflow_run.pull_requests) != '[]'
    # Pin to a release tag; update when upgrading.
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-pr-checks-fix.lock.yml@v0
    # Required: COPILOT_GITHUB_TOKEN secret.
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
