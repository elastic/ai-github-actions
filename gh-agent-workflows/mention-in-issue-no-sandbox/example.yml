name: Mention in Issue (no sandbox)
on:
  issue_comment:
    types: [created]

permissions:
  actions: read
  contents: write
  copilot-requests: write
  discussions: write
  issues: write
  pull-requests: write

jobs:
  run:
    if: >-
      github.event.issue.pull_request == null &&
      startsWith(github.event.comment.body, '/ai')
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-mention-in-issue-no-sandbox.lock.yml@v0