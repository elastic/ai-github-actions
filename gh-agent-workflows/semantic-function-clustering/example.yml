name: Semantic Function Clustering
on:
  # Customize trigger events, filters, and schedules for your repo.
  schedule:
    - cron: "0 12 * * 1-5"  # adjust schedule
  workflow_dispatch:  # enable manual runs

permissions:
  # Use least-privilege; add write scopes only when needed.
  contents: read
  issues: write
  pull-requests: read

jobs:
  run:
    # Pin to a release tag; update when upgrading.
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-semantic-function-clustering.lock.yml@v0
    # Required: COPILOT_GITHUB_TOKEN secret.
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
