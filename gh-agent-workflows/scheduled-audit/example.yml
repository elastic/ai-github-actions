name: Scheduled Audit
on:
  schedule:
    - cron: "0 11 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  run:
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-scheduled-audit.lock.yml@e1d1b3475a1318f42c9f46c597f9b0eb0972bd74 # v0.2.5
    with:
      issue-title-prefix: "[my-audit]"
      issue-label: "my-audit"
      additional-instructions: |
        Describe what the audit agent should investigate here.

        ### Data Gathering
        - What to examine (recent commits, open PRs, config files, etc.)

        ### What to Look For
        - What constitutes a finding worth reporting

        ### What to Skip
        - What to ignore
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
