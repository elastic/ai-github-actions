name: Breaking Change Detect
on:
  schedule:
    - cron: "0 13 * * 1-5"
  workflow_dispatch:

concurrency:
  group: breaking-change-detect
  cancel-in-progress: true

jobs:
  run:
    uses: ./.github/workflows/gh-aw-breaking-change-detect.lock.yml
    secrets:
      COPILOT_TOKEN: ${{ secrets.COPILOT_TOKEN }}
