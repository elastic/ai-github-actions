name: Duplicate Issue Detector
on:
  issues:
    types: [opened]

permissions:
  actions: read
  contents: read
  copilot-requests: write
  issues: write
  pull-requests: read

jobs:
  run:
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-duplicate-issue-detector.lock.yml@v0
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
