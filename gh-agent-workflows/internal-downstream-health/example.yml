name: Internal Downstream Health
on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  copilot-requests: write
  issues: write
  pull-requests: read

jobs:
  run:
    uses: elastic/ai-github-actions/.github/workflows/internal-downstream-health.lock.yml@v0
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
