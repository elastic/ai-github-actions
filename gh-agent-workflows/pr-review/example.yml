name: PR Review
on:
  # Customize trigger events, filters, and schedules for your repo.
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]

permissions:
  # Use least-privilege; add write scopes only when needed.
  contents: read
  issues: read
  pull-requests: write

jobs:
  run:
    # Gate execution (for example, /ai commands or label filters).
    if: >-
      github.event.pull_request.draft == false &&
      !contains(github.event.pull_request.labels.*.name, 'skip-auto-pr-review')
    # Pin to a release tag; update when upgrading.
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-pr-review.lock.yml@v0
    # Required: COPILOT_GITHUB_TOKEN secret.
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
