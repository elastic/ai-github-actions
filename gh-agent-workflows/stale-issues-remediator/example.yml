name: Stale Issues Remediator
on:
  schedule:
    - cron: "0 16 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  run:
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-stale-issues-remediator.lock.yml@v0
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
