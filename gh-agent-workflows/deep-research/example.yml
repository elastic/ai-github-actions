name: Deep Research
on:
  issue_comment:
    types: [created]

permissions:
  actions: read
  contents: read
  discussions: write
  issues: write
  pull-requests: read

jobs:
  run:
    if: >-
      github.event.issue.pull_request == null &&
      startsWith(github.event.comment.body, '/research')
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-deep-research.lock.yml@v0
    secrets:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
