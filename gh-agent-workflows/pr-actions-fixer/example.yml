name: PR Actions Fixer
on:
  workflow_dispatch:
    inputs:
      workflow-run-id:
        description: "Failed workflow run ID to analyze"
        required: true
        type: string

permissions:
  actions: read
  contents: write
  issues: write
  pull-requests: write

jobs:
  run:
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-pr-actions-fixer.lock.yml@e1d1b3475a1318f42c9f46c597f9b0eb0972bd74 # v0.2.5
    with:
      workflow-run-id: ${{ inputs.workflow-run-id }}
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
