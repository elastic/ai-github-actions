name: Issue Triage (Optional PRs)
on:
  issues:
    types: [opened]

permissions:
  contents: read
  discussions: write
  issues: write
  pull-requests: write

jobs:
  run:
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-issue-triage-pr.lock.yml@v0
    with:
      automatic-prs: "false"
      draft-prs: "true"
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
