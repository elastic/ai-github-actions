name: Stale Issues Investigator
on:
  schedule:
    - cron: "0 15 * * 1-5"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  copilot-requests: write
  issues: write
  pull-requests: write

jobs:
  run:
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-stale-issues-investigator.lock.yml@v0
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
