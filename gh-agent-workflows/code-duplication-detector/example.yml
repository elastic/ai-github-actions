name: Code Duplication Detector
on:
  schedule:
    - cron: "0 12 * * 1-5"
  workflow_dispatch:
    inputs:
      issue-labels:
        description: "Comma-separated labels to apply when creating an issue"
        required: false
        default: "code-duplication,ai:fix-ready"

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  run:
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-code-duplication-detector.lock.yml@v0
    with:
      languages: "go,python,typescript"
      additional-instructions: |
        When calling create_issue, apply these labels:
        `${{ inputs.issue-labels || 'code-duplication,ai:fix-ready' }}`
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
