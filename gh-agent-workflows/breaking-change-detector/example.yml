name: Breaking Change Detector
on:
  schedule:
    - cron: "0 13 * * 1-5"
  workflow_dispatch:
    inputs:
      issue-labels:
        description: "Comma-separated labels to apply when creating an issue"
        required: false
        default: "breaking-change,ai:fix-ready"
      assign-to:
        description: "Comma-separated GitHub usernames to assign when creating an issue"
        required: false
        default: ""

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  run:
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-breaking-change-detector.lock.yml@v0
    with:
      additional-instructions: |
        When calling create_issue, apply these labels:
        `${{ inputs.issue-labels || 'breaking-change,ai:fix-ready' }}`
        If `${{ inputs.assign-to || '' }}` is non-empty, set create_issue assignees to those usernames.
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
