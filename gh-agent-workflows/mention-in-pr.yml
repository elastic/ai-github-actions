name: Mention in PR
on:
  issue_comment:
    types: [created]

jobs:
  run:
    if: >-
      github.event.issue.pull_request != null &&
      startsWith(github.event.comment.body, '/ai')
    uses: ./.github/workflows/gh-aw-mention-in-pr.lock.yml
    secrets:
      COPILOT_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
