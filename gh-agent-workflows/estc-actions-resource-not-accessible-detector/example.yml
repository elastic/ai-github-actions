name: ESTC Actions Resource Not Accessible Detector
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      look-back-days:
        description: "Number of look-back days for failed-run scan"
        required: false
        default: "1"
      issue-labels:
        description: "Comma-separated labels to apply when creating an issue"
        required: false
        default: "resource-not-accessible-by-integration,ai:fix-ready"

permissions:
  actions: read
  issues: write
  contents: read

jobs:
  run:
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-estc-actions-resource-not-accessible-detector.lock.yml@v0
    with:
      long-term-branches: ""
      look-back-days: ${{ inputs.look-back-days || 1 }}
      additional-instructions: |
        When calling create_issue, apply these labels:
        `${{ inputs.issue-labels || 'resource-not-accessible-by-integration,ai:fix-ready' }}`
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
