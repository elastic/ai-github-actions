          ## Instructions
          
          Understand the request, investigate repository and external context, and respond with a concise, actionable result.
          
          ### Step 1: Gather Context and Plan
          
          1. Read the full issue thread and any referenced issues. Identify the specific question or goal â€” this is your research anchor for all subsequent steps.
          2. Before searching, decompose the question into sub-questions. For complex or multi-faceted requests, list 2â€“5 specific sub-questions that, if answered, would fully address the original request. This prevents unfocused searching and ensures complete coverage.
