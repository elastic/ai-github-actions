                    "type": "string"
                  },
                  "side": {
                    "description": "Side of the diff to comment on: RIGHT for the new version (additions), LEFT for the old version (deletions). Defaults to RIGHT.",
                    "enum": [
                      "LEFT",
                      "RIGHT"
                    ],
                    "type": "string"
                  },
                  "start_line": {
