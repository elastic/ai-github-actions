name: Trigger Breaking Change Detector
on:
  schedule:
    - cron: "0 13 * * 1-5"
  workflow_dispatch:
    inputs:
      allowed-labels:
        description: "Comma-separated labels the agent is allowed to apply to created issues (leave empty to skip labeling)"
        required: false
        default: "breaking-change,ai:fix-ready"
      allowed-assignees:
        description: "Comma-separated GitHub usernames the agent is allowed to assign to created issues (leave empty to skip assigning)"
        required: false
        default: ""

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  run:
    uses: ./.github/workflows/gh-aw-breaking-change-detector.lock.yml
