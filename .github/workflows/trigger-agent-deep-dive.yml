name: Trigger Agent Deep Dive
on:
  schedule:
    - cron: "0 14 * * 1-5"
  workflow_dispatch:
    inputs:
      target-workflow:
        description: "Workflow file name to deep dive (e.g. trigger-pr-review.yml)"
        required: false
        default: ""
      run-count:
        description: "Number of recent runs to analyze"
        required: false
        default: "20"

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: read

jobs:
  run:
    uses: ./.github/workflows/gh-aw-agent-deep-dive.lock.yml
    with:
      target-workflow: ${{ inputs.target-workflow || '' }}
      run-count: ${{ inputs.run-count || '20' }}
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
