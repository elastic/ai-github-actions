---
name: "Internal: Smoke Test — Install & Compile"
on:
  schedule:
    - cron: "0 6 * * *" # Daily at 06:00 UTC
  workflow_dispatch:

jobs:
  smoke-test:
    name: Install and compile all workflows
    runs-on: ubuntu-latest
    env:
      GH_AW_VERSION: "v0.48.1"
    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: false

      - name: Install pinned gh-aw CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          GOBIN="$HOME/.local/bin" go install "github.com/github/gh-aw/cmd/gh-aw@${GH_AW_VERSION}"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/gh-aw" version

      - name: Create a fresh repo
        run: |
          mkdir /tmp/test-repo && cd /tmp/test-repo
          git init -b main
          git config user.name "smoke-test"
          git config user.email "smoke-test@localhost"
          git commit --allow-empty -m "init"

      - name: Install every workflow
        working-directory: /tmp/test-repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          WORKFLOWS=(
            agent-efficiency
            agent-suggestions
            breaking-change-detector
            bug-exterminator
            bug-hunter
            code-duplication-detector
            code-duplication-fixer
            code-simplifier
            docs-patrol
            duplicate-issue-detector
            estc-docs-patrol-external
            estc-docs-pr-review
            estc-newbie-contributor-patrol-external
            estc-pr-buildkite-detective
            flaky-test-investigator
            issue-fixer
            issue-triage
            mention-in-issue
            mention-in-pr
            newbie-contributor-fixer
            newbie-contributor-patrol
            performance-profiler
            pr-actions-detective
            pr-actions-fixer
            pr-review
            project-summary
            release-update
            scheduled-audit
            scheduled-fix
            small-problem-fixer
            stale-issues
            test-coverage-detector
            test-improver
            text-auditor
            text-beautifier
            update-pr-body
          )

          FAILED=0

          for wf in "${WORKFLOWS[@]}"; do
            echo "::group::Installing ${wf}"
            if gh-aw add "elastic/ai-github-actions/.github/workflows/gh-aw-${wf}.md" --non-interactive; then
              echo "::endgroup::"
            else
              echo "::endgroup::"
              echo "::error::Failed to install ${wf}"
              FAILED=$((FAILED + 1))
            fi
          done

          echo ""
          echo "=== Installed shims ==="
          ls -la .github/workflows/*.md
          echo ""
          echo "=== Compiled lock files ==="
          ls -lh .github/workflows/*.lock.yml

          if [ "$FAILED" -gt 0 ]; then
            echo "::error::${FAILED} workflow(s) failed to install"
            exit 1
          fi

      - name: Verify lock files
        working-directory: /tmp/test-repo
        run: |
          set -euo pipefail
          SHIMS=$(find .github/workflows -maxdepth 1 -name "*.md" | wc -l | tr -d ' ')
          LOCKS=$(find .github/workflows -maxdepth 1 -name "*.lock.yml" | wc -l | tr -d ' ')

          echo "Shims: ${SHIMS}"
          echo "Lock files: ${LOCKS}"

          if [ "$LOCKS" -eq 0 ]; then
            echo "::error::No lock files generated"
            exit 1
          fi

          if [ "$LOCKS" -ne "$SHIMS" ]; then
            echo "::error::Shim count (${SHIMS}) does not match lock file count (${LOCKS})"
            echo ""
            echo "Shims:"
            find .github/workflows -maxdepth 1 -name "*.md" | sort
            echo ""
            echo "Lock files:"
            find .github/workflows -maxdepth 1 -name "*.lock.yml" | sort
            exit 1
          fi

          echo "All ${SHIMS} workflows installed and compiled successfully."
