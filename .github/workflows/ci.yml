---
name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  lint-workflows:
    name: Validate GitHub Actions workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up actionlint
        run: make setup-actionlint
      - name: Validate workflows
        run: make lint-workflows
  lint-actions:
    name: Validate GitHub Actions composite actions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up action-validator
        run: make setup-action-validator
      - name: Validate composite actions
        run: make lint-actions
  make-compile:
    name: Verify compiled workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: false
      - name: Compile workflows
        run: make compile
      - name: Ensure lock files are up to date
        run: |
          git checkout -- .github/workflows/agentics-maintenance.yml
          if [ -n "$(git status --porcelain)" ]; then
            echo "Working tree dirty after make compile."
            git status --porcelain
            exit 1
          fi
