name: "Internal: Tests"
on:
  pull_request:
    paths:
      - ".github/workflows/gh-aw-fragments/**"
      - "tests/**"
      - "pyproject.toml"
  push:
    branches: [main]
    paths:
      - ".github/workflows/gh-aw-fragments/**"
      - "tests/**"
      - "pyproject.toml"

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - name: Run tests
        run: uv run --extra test pytest tests/ -v
