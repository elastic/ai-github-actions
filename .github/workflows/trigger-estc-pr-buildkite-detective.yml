# Edit gh-agent-workflows/estc-pr-buildkite-detective/example.yml and run 'make compile' to regenerate.
name: Trigger Estc PR Buildkite Detective
on:
  status:
  check_run:
    types: [completed]

permissions:
  actions: read
  contents: read
  discussions: write
  issues: write
  pull-requests: write  # required by gh-aw compiler for add-comment (github/gh-aw#16673)

jobs:
  run:
    if: >-
      (github.event_name == 'status' && github.event.state == 'failure') ||
      (github.event_name == 'check_run' && github.event.check_run.conclusion == 'failure')
    uses: ./.github/workflows/gh-aw-estc-pr-buildkite-detective.lock.yml
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
      BUILDKITE_API_TOKEN: ${{ secrets.BUILDKITE_API_TOKEN }}

  cleanup:
    name: Remove older detective comments
    needs: run
    if: needs.run.result == 'success' && needs.run.outputs.comment_id != ''
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Delete older detective comments
        uses: actions/github-script@v7
        env:
          NEW_COMMENT_ID: ${{ needs.run.outputs.comment_id }}
        with:
          script: |
            const newCommentId = process.env.NEW_COMMENT_ID;

            // Resolve the PR number from the triggering event
            let prNumber;
            if (context.eventName === 'check_run') {
              const prs = context.payload.check_run.pull_requests;
              if (prs && prs.length > 0) {
                prNumber = prs[0].number;
              }
            } else if (context.eventName === 'status') {
              const sha = context.payload.commit.sha;
              const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: sha,
              });
              if (prs.length > 0) {
                prNumber = prs[0].number;
              }
            }

            if (!prNumber) {
              core.info('No PR number found, skipping cleanup');
              return;
            }

            core.info(`Cleaning up older detective comments on PR #${prNumber} (keeping comment ${newCommentId})`);

            // List all comments on the PR
            // context.repo is { owner, repo } where repo is the repository name
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            // Identify and delete older detective comments.
            // Detective comments are recognized by three structural markers:
            //   1. ela.st/github-ai-tools — present in the gh-aw footer of every detective comment
            //   2. buildkite.com — present in the Buildkite build evidence link
            //   3. ### TL;DR — the mandatory header in every detective comment response
            for (const comment of comments) {
              if (comment.id.toString() === newCommentId) continue;
              const body = comment.body || '';
              if (
                body.includes('ela.st/github-ai-tools') &&
                body.includes('buildkite.com') &&
                body.includes('### TL;DR')
              ) {
                core.info(`Deleting older detective comment ${comment.id}`);
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id,
                });
              }
            }
