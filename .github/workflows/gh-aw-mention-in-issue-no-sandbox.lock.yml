name: "Mention in Issue (no sandbox)"
on:
  discussion_comment:
    types:
    - created
  issue_comment:
    types:
    - created
  pull_request_review_comment:
    types:
    - created
  workflow_call:
    inputs:
      aw_context:
        default: ""
        description: "Agent caller context (used internally by Agentic Workflows)."
        required: false
        type: string
      additional-instructions:
        default: ""
        description: Repo-specific instructions appended to the agent prompt
        required: false
        type: string
      allowed-bot-users:
        default: github-actions[bot]
        description: Allowed bot actor usernames (comma-separated)
        required: false
        type: string
      draft-prs:
        default: true
        description: Whether to create pull requests as drafts
        required: false
        type: boolean
      messages-footer:
        default: ""
        description: Footer appended to all agent comments and reviews
        required: false
        type: string
      model:
        default: gpt-5.3-codex
        description: AI model to use
        required: false
        type: string
      setup-commands:
        default: ""
        description: Shell commands to run before the agent starts (dependency install, build, etc.)
        required: false
        type: string
    outputs:
      comment_id:
        description: ID of the first added comment
        value: ${{ jobs.safe_outputs.outputs.comment_id }}
      comment_url:
        description: URL of the first added comment
        value: ${{ jobs.safe_outputs.outputs.comment_url }}
      created_issue_number:
        description: Number of the first created issue
        value: ${{ jobs.safe_outputs.outputs.created_issue_number }}
      created_issue_url:
        description: URL of the first created issue
        value: ${{ jobs.safe_outputs.outputs.created_issue_url }}
      created_pr_number:
        description: Number of the first created pull request
        value: ${{ jobs.safe_outputs.outputs.created_pr_number }}
      created_pr_url:
        description: URL of the first created pull request
        value: ${{ jobs.safe_outputs.outputs.created_pr_url }}
    secrets:
      COPILOT_GITHUB_TOKEN:
        required: false
      EXTRA_COMMIT_GITHUB_TOKEN:
        required: false
      GH_AW_GITHUB_MCP_SERVER_TOKEN:
        required: false
      GH_AW_GITHUB_TOKEN:
        required: false

permissions: {}

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-mention-issue-no-sandbox-${{ github.event.issue.number }}

run-name: "Mention in Issue (no sandbox)"

