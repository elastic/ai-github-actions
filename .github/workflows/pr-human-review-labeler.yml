name: PR Human Review Labeler

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, edited]

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write

jobs:
  run:
    uses: ./.github/workflows/gh-aw-pr-human-review-labeler.lock.yml
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
