name: Trigger PR Review
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]

permissions:
  contents: read
  issues: write  # needed for no-op run tracking issue
  pull-requests: write

jobs:
  run:
    if: >-
      github.event.pull_request.draft == false &&
      !contains(github.event.pull_request.labels.*.name, 'skip-auto-pr-review')
    uses: ./.github/workflows/gh-aw-pr-review.lock.yml
    with:
      allowed-bot-users: "github-actions[bot],copilot"
      intensity: aggressive
      minimum_severity: nitpick
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
