name: "Docs Patrol"
"on":
  workflow_call:
    inputs:
      additional-instructions:
        default: ""
        description: Repo-specific instructions appended to the agent prompt
        required: false
        type: string
      allowed-bot-users:
        default: github-actions[bot]
        description: Allowed bot actor usernames (comma-separated)
        required: false
        type: string
      lookback-window:
        default: 7 days ago
        description: Git lookback window for detecting recent commits (e.g. '7 days ago', '14 days ago')
        required: false
        type: string
      messages-footer:
        default: ""
        description: Footer appended to all agent comments and reviews
        required: false
        type: string
      model:
        default: gpt-5.3-codex
        description: AI model to use
        required: false
        type: string
      setup-commands:
        default: ""
        description: Shell commands to run before the agent starts (dependency install, build, etc.)
        required: false
        type: string
      title-prefix:
        default: "[docs-patrol]"
        description: Title prefix for created issues (e.g. '[docs-patrol]')
        required: false
        type: string
    outputs:
      created_issue_number:
        description: Number of the first created issue
        value: ${{ jobs.safe_outputs.outputs.created_issue_number }}
      created_issue_url:
        description: URL of the first created issue
        value: ${{ jobs.safe_outputs.outputs.created_issue_url }}
    secrets:
      COPILOT_GITHUB_TOKEN:
        required: true

permissions: {}

