name: Trigger PR Review Addresser
on:
  pull_request_review:
    types: [submitted]

permissions:
  actions: read
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: pr-review-addresser-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  run:
    if: >-
      (github.event.review.state == 'changes_requested' || github.event.review.state == 'commented') &&
      !github.event.pull_request.draft &&
      !contains(github.event.pull_request.labels.*.name, 'skip-auto-pr-review-addresser')
    uses: ./.github/workflows/gh-aw-pr-review-addresser.lock.yml
    with:
      allowed-bot-users: "coderabbitai[bot],github-actions[bot],copilot"
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
