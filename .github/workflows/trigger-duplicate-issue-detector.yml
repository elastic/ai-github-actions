name: Trigger Duplicate Issue Detector
on:
  issues:
    types: [opened]

permissions:
  contents: read
  discussions: write
  issues: write
  pull-requests: read

jobs:
  run:
    uses: ./.github/workflows/gh-aw-duplicate-issue-detector.lock.yml
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
