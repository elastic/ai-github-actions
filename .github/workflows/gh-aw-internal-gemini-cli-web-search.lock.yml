name: "Internal Gemini CLI Web Search"
on:
  discussion_comment:
    types:
    - created
  issue_comment:
    types:
    - created
  pull_request_review_comment:
    types:
    - created
  workflow_call:
    inputs:
      aw_context:
        default: ""
        description: "Agent caller context (used internally by Agentic Workflows)."
        required: false
        type: string
      additional-instructions:
        default: ""
        description: Repo-specific instructions appended to the agent prompt
        required: false
        type: string
      allowed-bot-users:
        default: github-actions[bot]
        description: Allowed bot actor usernames (comma-separated)
        required: false
        type: string
      messages-footer:
        default: ""
        description: Footer appended to all agent comments and reviews
        required: false
        type: string
      model:
        default: ""
        description: AI model to use
        required: false
        type: string
      setup-commands:
        default: ""
        description: Shell commands to run before the agent starts (dependency install, build, etc.)
        required: false
        type: string
      title-prefix:
        default: "[research]"
        description: Title prefix for created issues (e.g. '[research]')
        required: false
        type: string
    outputs:
      comment_id:
        description: ID of the first added comment
        value: ${{ jobs.safe_outputs.outputs.comment_id }}
      comment_url:
        description: URL of the first added comment
        value: ${{ jobs.safe_outputs.outputs.comment_url }}
      created_issue_number:
        description: Number of the first created issue
        value: ${{ jobs.safe_outputs.outputs.created_issue_number }}
      created_issue_url:
        description: URL of the first created issue
        value: ${{ jobs.safe_outputs.outputs.created_issue_url }}
    secrets:
      GEMINI_API_KEY:
        required: true
      GH_AW_GITHUB_MCP_SERVER_TOKEN:
        required: false
      GH_AW_GITHUB_TOKEN:
        required: false

permissions: {}

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-internal-gemini-cli-web-search-${{ github.event.issue.number }}

run-name: "Internal Gemini CLI Web Search"

jobs:
  activation:
    needs: pre_activation
    if: needs.pre_activation.outputs.activated == 'true'
    runs-on: ubuntu-slim
    permissions:
      actions: read
      contents: read
      discussions: write
      issues: write
      pull-requests: write
    env:
      GH_AW_MAX_DAILY_AI_CREDITS: ${{ vars.GH_AW_DEFAULT_MAX_DAILY_AI_CREDITS || '5000' }}
    outputs:
      artifact_prefix: ${{ steps.artifact-prefix.outputs.prefix }}
      body: ${{ steps.sanitized.outputs.body }}
      comment_id: ""
      comment_repo: ""
      daily_effective_workflow_exceeded: ${{ steps.daily-effective-workflow-guardrail.outputs.daily_effective_workflow_exceeded == 'true' }}
      daily_effective_workflow_threshold: ${{ steps.daily-effective-workflow-guardrail.outputs.daily_effective_workflow_threshold || '' }}
      daily_effective_workflow_total_effective_tokens: ${{ steps.daily-effective-workflow-guardrail.outputs.daily_effective_workflow_total_effective_tokens || '' }}
      engine_id: ${{ steps.generate_aw_info.outputs.engine_id }}
      lockdown_check_failed: ${{ steps.generate_aw_info.outputs.lockdown_check_failed == 'true' }}
      model: ${{ steps.generate_aw_info.outputs.model }}
      secret_verification_result: ${{ steps.validate-secret.outputs.verification_result }}
      setup-parent-span-id: ${{ steps.setup.outputs.parent-span-id || steps.setup.outputs.span-id }}
      setup-span-id: ${{ steps.setup.outputs.span-id }}
      setup-trace-id: ${{ steps.setup.outputs.trace-id }}
      text: ${{ steps.sanitized.outputs.text }}
      title: ${{ steps.sanitized.outputs.title }}
    steps:
      - name: Setup Scripts
        id: setup
        uses: github/gh-aw/actions/setup@9c481b8bc46dce8b92fce8ffc51781e5c330d37c # v0.79.6
        with:
          destination: ${{ runner.temp }}/gh-aw/actions
          job-name: ${{ github.job }}
          trace-id: ${{ needs.pre_activation.outputs.setup-trace-id }}
          parent-span-id: ${{ needs.pre_activation.outputs.setup-parent-span-id || needs.pre_activation.outputs.setup-span-id }}
          safe-output-artifact-client: ${{ env.GH_AW_MAX_DAILY_AI_CREDITS != '' }}
        env:
          GH_AW_SETUP_WORKFLOW_NAME: "Internal Gemini CLI Web Search"
          GH_AW_CURRENT_WORKFLOW_REF: ${{ github.repository }}/.github/workflows/gh-aw-internal-gemini-cli-web-search.lock.yml@${{ github.ref }}
          GH_AW_INFO_ENGINE_ID: "gemini"
          GH_AW_SETUP_AW_CONTEXT: ${{ inputs.aw_context }}
      - name: Compute artifact prefix
        id: artifact-prefix
        env:
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: bash "${RUNNER_TEMP}/gh-aw/actions/compute_artifact_prefix.sh"
      - name: Generate agentic run info
        id: generate_aw_info
        env:
          GH_AW_INFO_ENGINE_ID: "gemini"
          GH_AW_INFO_ENGINE_NAME: "Google Gemini CLI"
          GH_AW_INFO_MODEL: "${{ inputs.model }}"
          GH_AW_INFO_VERSION: ""
          GH_AW_INFO_AGENT_VERSION: ""
          GH_AW_INFO_CLI_VERSION: "v0.79.6"
          GH_AW_INFO_WORKFLOW_NAME: "Internal Gemini CLI Web Search"
          GH_AW_INFO_EXPERIMENTAL: "false"
          GH_AW_INFO_SUPPORTS_TOOLS_ALLOWLIST: "true"
          GH_AW_INFO_STAGED: "false"
          GH_AW_INFO_ALLOWED_DOMAINS: '["*","artifacts.elastic.co","cloud.elastic.co","ela.st","elastic.co","public-code-search.fastmcp.app","www.elastic.co"]'
          GH_AW_INFO_FIREWALL_ENABLED: "false"
          GH_AW_INFO_AWF_VERSION: ""
          GH_AW_INFO_AWMG_VERSION: ""
          GH_AW_INFO_FIREWALL_TYPE: "squid"
          GH_AW_COMPILED_STRICT: "false"
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { setupGlobals } = require('${{ runner.temp }}/gh-aw/actions/setup_globals.cjs');
            setupGlobals(core, github, context, exec, io, getOctokit);
            const { main } = require('${{ runner.temp }}/gh-aw/actions/generate_aw_info.cjs');
            await main(core, context);
      - name: Check daily workflow token guardrail
        id: daily-effective-workflow-guardrail
        if: ${{ env.GH_AW_MAX_DAILY_AI_CREDITS != '' }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          GH_AW_WORKFLOW_NAME: "Internal Gemini CLI Web Search"
          GH_AW_WORKFLOW_ID: "gh-aw-internal-gemini-cli-web-search"
          GH_AW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GH_AW_WORKFLOW_DISPATCH_AW_CONTEXT: ${{ github.event.inputs.aw_context || '' }}
          GH_AW_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_AW_MAX_DAILY_AI_CREDITS: ${{ vars.GH_AW_DEFAULT_MAX_DAILY_AI_CREDITS || '5000' }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
