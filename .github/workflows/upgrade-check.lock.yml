name: "Internal: Upgrade Check"
on:
  # bots: # Bots processed as bot check in pre-activation job
  # - github-actions[bot] # Bots processed as bot check in pre-activation job
  # roles: # Roles processed as role check in pre-activation job
  # - admin # Roles processed as role check in pre-activation job
  # - maintainer # Roles processed as role check in pre-activation job
  # - write # Roles processed as role check in pre-activation job
  schedule:
    - cron: "20 13 * * 1-5"  # Friendly format: daily around 14:00 on weekdays (scattered)
  # stale-check: false # Stale-check processed as frontmatter hash check step in activation job
  workflow_dispatch:
    inputs:
      aw_context:
        default: ""
        description: "Agent caller context (used internally by Agentic Workflows)."
        required: false
        type: string
      title-prefix:
        default: "[gh-aw-upgrade]"
        description: Title prefix for created issues
        required: false

permissions: {}

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-upgrade-check

run-name: "Internal: Upgrade Check"

jobs:
  activation:
    needs: pre_activation
    if: needs.pre_activation.outputs.activated == 'true'
    runs-on: ubuntu-slim
    permissions:
      actions: read
      contents: read
    env:
      GH_AW_MAX_DAILY_AI_CREDITS: ${{ vars.GH_AW_DEFAULT_MAX_DAILY_AI_CREDITS || '5000' }}
      GH_AW_RUNTIME_FEATURES: ${{ vars.GH_AW_RUNTIME_FEATURES }}
    outputs:
      comment_id: ""
      comment_repo: ""
      daily_ai_credits_exceeded: ${{ steps.daily-effective-workflow-guardrail.outputs.daily_ai_credits_exceeded == 'true' }}
      daily_ai_credits_threshold: ${{ steps.daily-effective-workflow-guardrail.outputs.daily_ai_credits_threshold || '' }}
      daily_ai_credits_total_effective_tokens: ${{ steps.daily-effective-workflow-guardrail.outputs.daily_ai_credits_total_effective_tokens || '' }}
      engine_id: ${{ steps.generate_aw_info.outputs.engine_id }}
      lockdown_check_failed: ${{ steps.generate_aw_info.outputs.lockdown_check_failed == 'true' }}
      model: ${{ steps.generate_aw_info.outputs.model }}
      oauth_token_check_failed: ${{ steps.check-oauth-tokens.outputs.oauth_token_check_failed == 'true' }}
      setup-parent-span-id: ${{ steps.setup.outputs.parent-span-id || steps.setup.outputs.span-id }}
      setup-span-id: ${{ steps.setup.outputs.span-id }}
      setup-trace-id: ${{ steps.setup.outputs.trace-id }}
    steps:
      - name: Setup Scripts
        id: setup
        uses: github/gh-aw/actions/setup@8b820ae1073f301991aaf2f307f7e271f618bb9f # v0.82.14
        with:
          destination: ${{ runner.temp }}/gh-aw/actions
          job-name: ${{ github.job }}
          trace-id: ${{ needs.pre_activation.outputs.setup-trace-id }}
          parent-span-id: ${{ needs.pre_activation.outputs.setup-parent-span-id || needs.pre_activation.outputs.setup-span-id }}
          safe-output-artifact-client: ${{ env.GH_AW_MAX_DAILY_AI_CREDITS != '' }}
        env:
          GH_AW_SETUP_WORKFLOW_NAME: "Internal: Upgrade Check"
          GH_AW_CURRENT_WORKFLOW_REF: ${{ github.repository }}/.github/workflows/upgrade-check.lock.yml@${{ github.ref }}
          GH_AW_INFO_VERSION: "1.0.71"
          GH_AW_INFO_AWF_VERSION: "v0.27.37"
          GH_AW_INFO_ENGINE_ID: "copilot"
      - name: Generate agentic run info
        id: generate_aw_info
        env:
          GH_AW_INFO_ENGINE_ID: "copilot"
          GH_AW_INFO_ENGINE_NAME: "GitHub Copilot CLI"
          GH_AW_INFO_MODEL: "gpt-5.3-codex"
          GH_AW_INFO_VERSION: "1.0.71"
          GH_AW_INFO_AGENT_VERSION: "1.0.71"
          GH_AW_INFO_CLI_VERSION: "v0.82.14"
          GH_AW_INFO_WORKFLOW_NAME: "Internal: Upgrade Check"
          GH_AW_INFO_EXPERIMENTAL: "false"
          GH_AW_INFO_SUPPORTS_TOOLS_ALLOWLIST: "true"
          GH_AW_INFO_STAGED: "false"
          GH_AW_INFO_ALLOWED_DOMAINS: '["agents-md-generator.fastmcp.app","artifacts.elastic.co","clojure","cloud.elastic.co","containers","dart","defaults","dotnet","ela.st","elastic.co","elastic.dev","elastic.github.io","elixir","fonts","github","github-actions","go","haskell","java","kotlin","linux-distros","node","node-cdns","perl","php","playwright","public-code-search.fastmcp.app","python","ruby","rust","scala","swift","terraform","www.elastic.co","zig"]'
          GH_AW_INFO_FIREWALL_ENABLED: "true"
