name: Trigger Mention in Issue
on:
  issue_comment:
    types: [created]

permissions:
  actions: read
  contents: write
  discussions: write
  issues: write
  pull-requests: write

jobs:
  run:
    if: >-
      github.event.issue.pull_request == null &&
      startsWith(github.event.comment.body, '/ai')
    uses: ./.github/workflows/gh-aw-mention-in-issue.lock.yml
    with:
      draft-prs: false
      allowed-bot-users: "github-actions[bot],copilot"
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
