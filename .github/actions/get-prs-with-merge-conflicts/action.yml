name: "Get PRs With Merge Conflicts"
description: "Wait briefly, then list open non-draft PRs with merge conflicts (mergeStateStatus=DIRTY)"

inputs:
  github-token:
    description: "GitHub token used for API calls"
    required: true
  settle-seconds:
    description: "Seconds to wait before checking merge conflict state"
    required: false
    default: "60"
  include-labels:
    description: "Only include PRs that have at least one of these labels (comma-separated). Empty means no include filter."
    required: false
    default: ""
  exclude-labels:
    description: "Exclude PRs that have any of these labels (comma-separated)."
    required: false
    default: ""
  author-associations:
    description: "Only include PRs whose author has one of these associations (comma-separated). Bot authors (login ending in [bot]) are always allowed. Empty means no filter. Values: OWNER, MEMBER, COLLABORATOR, CONTRIBUTOR, FIRST_TIME_CONTRIBUTOR, FIRST_TIMER, NONE."
    required: false
    default: "OWNER,MEMBER,COLLABORATOR"
  opt-out-label:
    description: "Deprecated: exclude PRs with this label (kept for backward compatibility)"
    required: false
    default: "no-address-merge-conflicts"

outputs:
  prs:
    description: "JSON array of conflicted PR objects, e.g. [{\"number\":123}]"
    value: ${{ steps.detect.outputs.prs }}
  count:
    description: "Count of conflicted PRs"
    value: ${{ steps.detect.outputs.count }}

runs:
  using: "composite"
  steps:
    - name: Wait for mergeability state to settle
      shell: bash
      run: sleep "${{ inputs.settle-seconds }}"

    - name: Detect open PRs with merge conflicts
      id: detect
      uses: actions/github-script@v7
      env:
        REPOSITORY: ${{ github.repository }}
        INPUT_INCLUDE_LABELS: ${{ inputs.include-labels }}
        INPUT_EXCLUDE_LABELS: ${{ inputs.exclude-labels }}
        INPUT_AUTHOR_ASSOCIATIONS: ${{ inputs.author-associations }}
        INPUT_OPT_OUT_LABEL: ${{ inputs.opt-out-label }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const [owner, repo] = process.env.REPOSITORY.split("/");
          const parseLabelSet = (input) =>
            new Set(
              input
                .split(",")
                .map((label) => label.trim().toLowerCase())
                .filter((label) => label.length > 0),
            );
          const includeLabels = parseLabelSet(process.env.INPUT_INCLUDE_LABELS ?? "");
          const excludeLabels = parseLabelSet(process.env.INPUT_EXCLUDE_LABELS ?? "");
          const allowedAssociations = new Set(
            (process.env.INPUT_AUTHOR_ASSOCIATIONS ?? "")
              .split(",")
              .map((a) => a.trim().toUpperCase())
              .filter((a) => a.length > 0),
          );
          const optOutLabel = (process.env.INPUT_OPT_OUT_LABEL ?? "").trim().toLowerCase();
          if (optOutLabel) {
            excludeLabels.add(optOutLabel);
          }
          const result = await github.graphql(
            `query($owner: String!, $repo: String!) {
              repository(owner: $owner, name: $repo) {
                pullRequests(first: 100, states: OPEN, orderBy: { field: UPDATED_AT, direction: DESC }) {
                  nodes {
                    number
                    isDraft
                    mergeStateStatus
                    authorAssociation
                    author { login }
                    labels(first: 50) {
                      nodes { name }
                    }
                  }
                }
              }
            }`,
            { owner, repo },
          );

          const allPrs = result.repository.pullRequests.nodes;
          core.info(`GraphQL returned ${allPrs.length} open PR(s)`);
          for (const pr of allPrs) {
            core.info(`  PR #${pr.number}: mergeStateStatus=${pr.mergeStateStatus}, isDraft=${pr.isDraft}, author=${pr.author?.login}, authorAssociation=${pr.authorAssociation}`);
          }

          const prs = [];
          for (const pr of allPrs) {
            const labels = new Set((pr.labels?.nodes ?? []).map((l) => l.name.toLowerCase()));
            const matchesInclude =
              includeLabels.size === 0 || [...includeLabels].some((label) => labels.has(label));
            const matchesExclude = [...excludeLabels].some((label) => labels.has(label));
            const isBot = pr.author?.login?.endsWith("[bot]") ?? false;
            const matchesAssociation =
              isBot || allowedAssociations.size === 0 || allowedAssociations.has(pr.authorAssociation);
            const conflicted = pr.mergeStateStatus === "DIRTY";
            if (!pr.isDraft && matchesInclude && !matchesExclude && matchesAssociation && conflicted) {
              prs.push({ number: pr.number });
            }
          }

          core.info(
            `Found ${prs.length} conflicted PR(s). includeLabels=${JSON.stringify([...includeLabels])}, excludeLabels=${JSON.stringify([...excludeLabels])}, authorAssociations=${JSON.stringify([...allowedAssociations])}`,
          );
          core.setOutput("prs", JSON.stringify(prs));
          core.setOutput("count", String(prs.length));
