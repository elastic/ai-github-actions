#
# Composite Action for responding to @claude mentions on Issues (Read-Write-Execute)
#
# Usage:
#   - uses: elastic/ai-github-actions/workflows/mention-in-issue/rwx@v0
#     with:
#       claude-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
#       github-token: ${{ github.token }}
#
name: "Claude Mention Response (Issue) - Read-Write-Execute"
description: "Respond when Claude is mentioned in issue comments (can write/execute, cannot push)"

branding:
  icon: "message-circle"
  color: "orange"

inputs:
  claude-oauth-token:
    description: "Claude OAuth token for authentication"
    required: true

  github-token:
    description: "GitHub token for Claude to operate with"
    required: true

  model:
    description: "Model to use for Claude"
    required: false
    default: "claude-opus-4-5-20251101"

  allowed-tools:
    description: "Comma-separated list of allowed tools for Claude"
    required: false
    default: "Edit,MultiEdit,Glob,Grep,LS,Read,Write,WebSearch,WebFetch,mcp__github_comment__update_claude_comment,mcp__github_ci__get_ci_status,mcp__github_ci__get_workflow_run_details,mcp__github_ci__download_job_log,Bash(*),mcp__agents-md-generator__generate_agents_md,mcp__public-code-search__search_code"

  extra-allowed-tools:
    description: "Additional comma-separated list of allowed tools (concatenated with allowed-tools)"
    required: false
    default: ""

  additional-instructions:
    description: "Additional instructions to include in the prompt"
    required: false
    default: ""

  track-progress:
    description: "Whether Claude should track progress with visual indicators"
    required: false
    default: "true"

  mcp-servers:
    description: "MCP server configuration JSON"
    required: false
    default: '{"mcpServers":{"agents-md-generator":{"type":"http","url":"https://agents-md-generator.fastmcp.app/mcp"},"public-code-search":{"type":"http","url":"https://public-code-search.fastmcp.app/mcp"}}}'

outputs:
  conclusion:
    description: "The conclusion of the Claude Code run"
    value: ${{ steps.claude.outputs.conclusion }}

runs:
  using: "composite"
  steps:
    - name: React to comment with eyes
      shell: bash
      run: |
        gh api "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
          -f content=eyes 2>/dev/null || true
      env:
        GH_TOKEN: ${{ inputs.github-token }}

    - name: Run Claude for Issue Mention
      id: claude
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      uses: elastic/ai-github-claude-code-action@working-forks
      with:
        claude_code_oauth_token: ${{ inputs.claude-oauth-token }}
        github_token: ${{ inputs.github-token }}
        track_progress: ${{ inputs.track-progress }}
        prompt: |
          <context>
          Repository: ${{ github.repository }}
          Issue Number: #${{ github.event.issue.number }}
          Issue Title: ${{ github.event.issue.title }}
          Issue Author: ${{ github.event.issue.user.login }}
          Comment Author: ${{ github.event.comment.user.login }}
          </context>

          <user_request>
          ${{ github.event.comment.body }}
          </user_request>

          <task>
          You have been mentioned in a GitHub issue comment. Understand the request, gather context, complete the task, and respond with results.
          </task>

          <constraints>
          This workflow allows read, write, and execute capabilities but cannot push changes.
          
          You CAN: Read/analyze code, modify files, write code, run tests, execute commands
          You CANNOT: Commit code, push changes, create branches, checkout branches, create pull requests
          
          **Important**: You cannot push changes to the repository - you can only make changes locally and provide feedback or recommendations.
          </constraints>

          <formatting_guidelines>
          - Lead with the most important information — your first sentence should be the key takeaway
          - Be concise and actionable — no filler or praise
          - Use <details> and <summary> tags for long sections to keep responses scannable
          - Wrap branch names and @-references in backticks to avoid pinging users
          - Include code snippets with file paths and line numbers when referencing the codebase
          </formatting_guidelines>

          <rigor>
          Silence is better than noise. A false positive wastes a human's time and erodes trust in every future report.

          - If you claim something is missing or broken, show the exact evidence in the code — file path, line number, and what you observed.
          - If a conclusion depends on assumptions you haven't confirmed, do not assert it. Verify first; if you cannot verify, do not report.
          - "I don't know" is better than a wrong answer. `noop` is better than a speculative finding.
          - It's worth the time to verify now versus guessing and forcing someone else to verify later.
          - Before filing any issue or opening any PR, re-read your own output as a skeptical reviewer. Ask: "Would a senior engineer on this team find this useful, or would they close it immediately?" If the answer is "close," call `noop` instead.
          - Only report findings you would confidently defend in a code review. If you feel the need to hedge with "might," "could," or "possibly," the finding is not ready to file.
          </rigor>

          <workflow_edit_guardrails>
          - Do not modify files under `.github/workflows/`.
          - If asked to change workflow files, place a copy under `github/` (no leading dot) and note that a maintainer must relocate it into `.github/workflows/`.
          </workflow_edit_guardrails>

          <mcp_pagination>
          MCP tool responses have a **25,000 token limit**. When responses exceed this limit, the call fails and you must retry with pagination — wasting turns and tokens. Use proactive pagination to stay under the limit.

          Recommended `perPage` values:
          - 5-10: For detailed items (PR diffs, files with patches, issues with comments)
          - 20-30: For medium-detail lists (commits, review comments, issue lists)
          - 50-100: For simple list operations (branches, labels, tags)

          Pagination pattern:
          1. Fetch the first page with a conservative `perPage` value
          2. Process the results before fetching the next page
          3. Continue fetching pages until you receive fewer results than `perPage` (indicating the last page)

          Error recovery:
          - If you see an error like `MCP tool response exceeds maximum allowed tokens (25000)` or `Response too large for tool [tool_name]`, retry with a smaller `perPage` value (halve it).

          Tips:
          - Start small: It's better to make multiple small requests than one that fails
          - Fetch incrementally: Get an overview first, then details for specific items
          - Use filters: Combine `perPage` with state, label, or date filters to reduce result size
          - Process as you go: Don't accumulate all pages before acting — process each batch immediately
          </mcp_pagination>


          <allowed_tools>
          You have access to the following tools (comma-separated list):
          
          ${{ inputs.allowed-tools }}
          ${{ inputs.extra-allowed-tools }}
          
          You can only use tools that are explicitly listed above. For Bash commands, the pattern `Bash(command:*)` means you can run that command with any arguments. If a command is not listed, it is not available.
          </allowed_tools>

          <getting_started>
          Use `mcp__agents-md-generator__generate_agents_md` to get repository context before responding.
          </getting_started>

          <investigation_approach>
          Be thorough in your investigations:
          - Understand the full context of the repository
          - Review related code, issues, and PRs
          - Consider edge cases and implications
          - Gather all relevant information before responding

          Available tools:
          - `mcp__public-code-search__search_code`: Search code in OTHER repositories (use `Grep`/`Read` for this repo)
          - `WebSearch`: Search the web for documentation, best practices, or solutions
          - `WebFetch`: Fetch and read content from URLs
          </investigation_approach>

          <common_tasks>
          - Answer questions about the codebase
          - Help debug reported problems (make changes locally to test, cannot push)
          - Suggest solutions or workarounds
          - Provide code examples
          - Help clarify requirements
          - Link to relevant documentation or code
          </common_tasks>

          <response_guidelines>
          - Be concise and actionable
          - If the request is unclear, ask clarifying questions
          - If the request requires actions you cannot perform (like pushing changes), explain what you can and cannot do
          - When making code changes, explain that they are local only and cannot be pushed
          </response_guidelines>

          <response_footer>
          Always end your comment with a new line, three dashes, and the footer message:
          <exact_content>

          ---
          [Why is Claude responding?](https://ela.st/github-ai-tools) | Type `@claude` to interact further

          Give us feedback! React with 🚀 if perfect, 👍 if helpful, 👎 if not.
          </exact_content>
          </response_footer>

          <github_formatting>
          When writing GitHub comments, wrap branch names, tags, or other @-references in backticks (e.g., `@main`, `@v1.0`) to avoid accidentally pinging users. Do not add backticks around terms that are already inside backticks or code blocks.
          </github_formatting>

          <additional_instructions>
          ${{ inputs.additional-instructions }}
          </additional_instructions>
        claude_args: |
          ${{ format('--allowedTools {0}{1}', inputs.allowed-tools, inputs.extra-allowed-tools != '' && format(',{0}', inputs.extra-allowed-tools) || '') }}
          --mcp-config '${{ inputs.mcp-servers }}'
          --model ${{ inputs.model }}
