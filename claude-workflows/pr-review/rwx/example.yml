# Example workflow for automatic PR review (read-write-execute)
# Copy this to your repo's .github/workflows/ directory
#
# This version provides review comments with code suggestions.
# All Bash commands are allowed by default.

name: PR Review (Read-Write-Execute)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]

permissions:
  contents: read  # Prevents git push even with Bash access. See SECURITY.md.
  issues: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Skip draft PRs and allow opt-out with the skip-auto-pr-review label.
    if: >-
      github.event.pull_request.draft == false &&
      !contains(github.event.pull_request.labels.*.name, 'skip-auto-pr-review')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      # Place environment setup commands here (e.g., install dependencies, configure tools)

      - name: Run Claude PR Review (Read-Write-Execute)
        uses: elastic/ai-github-actions/claude-workflows/pr-review/rwx@v0
        with:
          claude-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github-token: ${{ github.token }}
          # Optional: add custom instructions
          # additional-instructions: "Pay special attention to security patterns"
          # Note: All Bash commands (Bash(*)) are allowed by default
          # Use extra-allowed-tools to add additional tools if needed

      - name: Minimize resolved review threads
        if: always()
        uses: strawgate/minimize-resolved-pr-reviews@v0
        with:
          github-token: ${{ github.token }}
